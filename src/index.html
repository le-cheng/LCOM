<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LCom - 现代串口调试工具</title>
    <script type="module" src="/main.js" defer></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 6h20M2 12h20M2 18h20M6 4v16M18 4v16"/>
                </svg>
                <h1>LCom</h1>
            </div>
            <div class="connection-status" id="connection-status">
                <span class="status-indicator" id="status-indicator"></span>
                <span class="status-text" id="status-text">未连接</span>
            </div>
        </header>

        <main class="main-content">
            <div class="settings-panel">
                <div class="section-title">串口配置</div>
                <div class="config-grid">
                    <div class="form-group">
                        <label for="port-select">串口</label>
                        <select id="port-select">
                            <option value="">扫描中...</option>
                        </select>
                        <button class="icon-btn" id="refresh-ports" title="刷新串口列表">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                        </button>
                    </div>

                    <div class="form-group">
                        <label for="baud-rate">波特率</label>
                        <select id="baud-rate">
                            <option value="9600">9600</option>
                            <option value="19200">19200</option>
                            <option value="38400">38400</option>
                            <option value="57600">57600</option>
                            <option value="115200" selected>115200</option>
                            <option value="230400">230400</option>
                            <option value="460800">460800</option>
                            <option value="921600">921600</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="data-bits">数据位</label>
                        <select id="data-bits">
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8" selected>8</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="stop-bits">停止位</label>
                        <select id="stop-bits">
                            <option value="1" selected>1</option>
                            <option value="2">2</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="parity">校验位</label>
                        <select id="parity">
                            <option value="None" selected>无</option>
                            <option value="Odd">奇校验</option>
                            <option value="Even">偶校验</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>&nbsp;</label>
                        <button class="btn primary-btn" id="connect-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                            打开串口
                        </button>
                    </div>
                </div>
            </div>

            <div class="communication-panel">
                <div class="section-title">通信数据</div>
                
                <div class="receive-section">
                    <div class="section-header">
                        <span class="section-label">接收数据</span>
                        <div class="section-actions">
                            <label class="checkbox-label">
                                <input type="checkbox" id="hex-receive" />
                                <span>HEX 显示</span>
                            </label>
                            <button class="icon-btn" id="clear-receive" title="清空接收区">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="data-display" id="receive-data"></div>
                </div>

                <div class="send-section">
                    <div class="section-header">
                        <span class="section-label">发送数据</span>
                        <label class="checkbox-label">
                            <input type="checkbox" id="hex-send" />
                            <span>HEX 发送</span>
                        </label>
                    </div>
                    <div class="send-input-group">
                        <textarea 
                            id="send-data" 
                            placeholder="输入要发送的数据..."
                            rows="3"
                        ></textarea>
                        <div class="send-actions">
                            <span class="byte-count" id="byte-count">0 字节</span>
                            <button class="btn primary-btn" id="send-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 19V5M5 12l7-7 7 7"/>
                                </svg>
                                发送
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-info">
                <span>LCom v0.1.0</span>
                <span>基于 Tauri 构建</span>
            </div>
        </footer>
    </div>
</body>
</html>
