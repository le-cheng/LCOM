name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build portable exe
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Rename exe with version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item src-tauri/target/release/lcom.exe "LCom-${tag}-portable.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'LCom ${{ github.ref_name }}'
          body: '便携版，下载 exe 即可直接运行。'
          draft: false
          prerelease: false
          files: LCom-*-portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
